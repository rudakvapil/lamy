name: Fetch FPL Data

on:
  schedule:
    - cron: "0 * * * *"   # každou hodinu
  push:
    branches: [main]
  workflow_dispatch:       # ruční spuštění přes GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaluj závislosti
        run: pip install requests

      - name: Spusť fetch skript
        run: python scripts/fetch_data.py

      - name: Commit dat do repozitáře (GitHub Pages)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/season.json
          git diff --staged --quiet || git commit -m "🔄 Data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

