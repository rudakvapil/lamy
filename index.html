<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Lamy z Panamy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEMES ── */
:root {
  --green:#00ff85;--pink:#e90052;--gold:#f5c842;--silver:#b0b0b0;--shame:#ff4444;
}
[data-theme="dark"] {
  --bg:#0d0d14;--bg2:#16161f;--bg3:#1e1e2a;--bg4:#252535;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#f0f0f0;--text2:#b0b0c0;--muted:rgba(240,240,240,0.45);--muted2:rgba(240,240,240,0.2);
  --shadow:rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:#f4f4f8;--bg2:#ffffff;--bg3:#eeeef4;--bg4:#e4e4ec;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);
  --text:#111118;--text2:#44445a;--muted:rgba(0,0,0,0.45);--muted2:rgba(0,0,0,0.2);
  --shadow:rgba(0,0,0,0.12);
}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;transition:background .3s,color .3s}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:54px;gap:4px;backdrop-filter:blur(12px)}
[data-theme="dark"] .nav{background:rgba(13,13,20,0.94)}
[data-theme="light"] .nav{background:rgba(244,244,248,0.94)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--green);margin-right:auto;white-space:nowrap;text-decoration:none}
.nav-logo span{color:var(--pink)}
.nav-tabs{display:flex;gap:2px;overflow-x:auto}.nav-tabs::-webkit-scrollbar{display:none}
.nt{background:none;border:none;cursor:pointer;padding:6px 11px;border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.nt:hover{color:var(--text);background:var(--bg3)}.nt.active{color:var(--green);background:rgba(0,255,133,0.12)}
.theme-toggle{background:none;border:1px solid var(--border);cursor:pointer;padding:5px 9px;border-radius:8px;color:var(--muted);font-size:16px;transition:all .15s;margin-left:8px;flex-shrink:0}
.theme-toggle:hover{color:var(--text);border-color:var(--border2)}

/* ── HERO ── */
.hero{position:relative;overflow:hidden;padding:48px 20px 36px;border-bottom:1px solid var(--border)}
[data-theme="dark"] .hero{background:radial-gradient(ellipse at 50% 0%,#1a0025 0%,var(--bg) 70%)}
[data-theme="light"] .hero{background:radial-gradient(ellipse at 50% 0%,#f0e8ff 0%,var(--bg) 70%)}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 60px,rgba(0,255,133,.008) 60px,rgba(0,255,133,.008) 61px)}
.hero-inner{position:relative;max-width:880px;margin:0 auto;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green);border:1px solid rgba(0,255,133,.3);padding:4px 14px;border-radius:20px;background:rgba(0,255,133,.06)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:pd 1.5s infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,9vw,82px);letter-spacing:2px;line-height:.95;margin-bottom:8px}
[data-theme="dark"] h1{background:linear-gradient(135deg,#fff 0%,var(--green) 55%,#aaffdd 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
[data-theme="light"] h1{background:linear-gradient(135deg,#111 0%,#008844 55%,#004422 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.kpis{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.kpi{text-align:center}.kv{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--green);display:block;line-height:1}
.kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ── UPDATE BAR ── */
.update-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:5px 20px;font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SECTIONS ── */
.sec{padding:24px 20px;max-width:1000px;margin:0 auto;display:none}.sec.active{display:block}
.st{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.st .a{color:var(--green)}.st .d{color:var(--muted);font-size:14px;font-family:'DM Sans',sans-serif;font-weight:400}
.div{height:1px;background:var(--border);margin:22px 0}
.sub{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--text)}
.sub::before{content:'';display:inline-block;width:3px;height:14px;background:var(--green);border-radius:2px}

/* ── TABLES ── */
.tw{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--bg2)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:9px 12px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(128,128,128,.04)}
tr.z1 td:first-child{border-left:2px solid var(--gold)}
tr.z2 td:first-child{border-left:2px solid var(--green)}
tr.z3 td:first-child{border-left:2px solid var(--shame)}
.lp{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;padding:3px 7px;border-radius:5px}
.lp.t{background:rgba(0,255,133,.12);color:var(--green)}.lp.m{background:rgba(245,200,66,.12);color:#c8a000}
[data-theme="light"] .lp.m{color:#9a7800}
.lp.b{background:rgba(255,68,68,.12);color:var(--shame)}
.frow{display:flex;gap:3px}.fd{width:8px;height:8px;border-radius:50%}
.fd.W{background:var(--green)}.fd.L{background:var(--shame)}.fd.D{background:var(--gold)}

/* ── STAT CARDS ── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.g::before{background:var(--gold)}.sc.n::before{background:var(--green)}.sc.s::before{background:var(--shame)}.sc.p::before{background:var(--pink)}
.sc .v{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;margin-bottom:2px}
.sc.g .v{color:var(--gold)}[data-theme="light"] .sc.g .v{color:#9a7800}
.sc.n .v{color:var(--green)}.sc.s .v{color:var(--shame)}.sc.p .v{color:var(--pink)}
.sc .lb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}.sc .nm{font-size:12px;font-weight:500;margin-top:5px;color:var(--text2)}

/* ── H2H ── */
.h2w{overflow-x:auto}.h2t{border-collapse:collapse;font-size:12px;min-width:500px}
.h2t th,.h2t td{padding:7px 8px;text-align:center;border:1px solid var(--border)}
.h2t th{background:var(--bg3);color:var(--muted);font-size:10px;text-transform:uppercase}
.h2t .hn{text-align:left;font-weight:500;color:var(--text);background:var(--bg3);white-space:nowrap}
.h2t .win{color:var(--green);font-weight:600}.h2t .loss{color:var(--shame)}.h2t .draw{color:#c8a000}.h2t .self{background:var(--bg4);color:var(--muted2)}

/* ── PLAYOFF ── */
.pg{display:grid;grid-template-columns:1fr 32px 1fr;gap:0;align-items:start;margin-bottom:28px}
.bm{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.bm.shiva{border-color:rgba(245,200,66,.35)}.bm.sacko{border-color:rgba(255,68,68,.35)}.bm.fin{border-color:rgba(0,255,133,.4)}.bm.playout{border-color:rgba(180,180,180,.25)}
.bh{padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.bh.sh{background:rgba(245,200,66,.08);color:var(--gold)}.bh.sk{background:rgba(255,68,68,.08);color:var(--shame)}
.bh.pl{background:rgba(180,180,180,.06);color:var(--silver)}.bh.fsh{background:rgba(245,200,66,.12);color:var(--gold)}
.bh.fsk{background:rgba(255,68,68,.12);color:var(--shame)}
.be{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
.be.w{background:rgba(0,255,133,.05)}.be.l{opacity:.5}
.bname{font-size:13px;font-weight:500}.bteam{font-size:11px;color:var(--muted)}
.nask.pos{color:var(--green);font-size:11px;font-weight:600}.nask.neg{color:var(--shame);font-size:11px;font-weight:600}
.bpts{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}.bpts.live{color:var(--gold)}
.barr{display:flex;align-items:center;justify-content:center;color:var(--border2);font-size:20px;padding-top:50px}
.bnote{font-size:11px;color:var(--muted);padding:7px 12px;border-top:1px solid var(--border);font-style:italic;line-height:1.4}
.virtual-row{background:rgba(0,255,133,.04);border-top:1px solid var(--border);padding:6px 14px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.tbadge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.tbadge.done{background:rgba(0,255,133,.12);color:var(--green)}.tbadge.live{background:var(--pink);color:#fff;animation:pd 1.5s infinite}.tbadge.tbd{background:rgba(245,200,66,.12);color:#c8a000}
.col-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:8px}
.bracket-section{margin-bottom:32px}

/* ── MANAGER CARDS ── */
.manager-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px}
.manager-tabs::-webkit-scrollbar{height:3px}.manager-tabs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mtab{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:8px;flex-shrink:0}
.mtab:hover{color:var(--text);border-color:var(--border2)}.mtab.active{color:var(--green);background:rgba(0,255,133,.08);border-color:rgba(0,255,133,.3)}
.mtab-avatar{width:24px;height:24px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--green)}
.manager-panel{display:none}.manager-panel.active{display:block}

.mcard-header{display:flex;align-items:center;gap:20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.mcard-avatar{width:80px;height:80px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);overflow:hidden;flex-shrink:0;font-size:42px}
.mcard-info{flex:1}
.mcard-name{font-size:22px;font-weight:700;margin-bottom:2px}
.mcard-team{font-size:13px;color:var(--muted);margin-bottom:8px}
.mcard-caption{font-size:12px;color:var(--muted);font-style:italic;line-height:1.4;border-left:2px solid var(--green);padding-left:10px;margin-top:8px}
.mcard-stats-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.mcard-stat{text-align:center}
.mcard-stat .val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green);line-height:1}
.mcard-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

.mcard-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.mcard-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.mcard-box-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.chip-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;margin:2px}
.chip-badge.bboost{background:rgba(0,255,133,.12);color:var(--green)}
.chip-badge.triple{background:rgba(245,200,66,.12);color:var(--gold)}
.chip-badge.freehit{background:rgba(233,0,82,.12);color:var(--pink)}
.chip-badge.wc{background:rgba(100,100,255,.12);color:#8888ff}

.cap-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cap-bar-fill{height:6px;border-radius:3px;background:var(--green)}
.cap-bar-name{font-size:13px;font-weight:500;min-width:70px}
.cap-bar-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-left:auto}

.gw-chart{display:flex;align-items:flex-end;gap:2px;height:60px;margin-top:8px}
.gw-bar{flex:1;min-width:3px;border-radius:2px 2px 0 0;background:var(--green);opacity:.6;transition:opacity .15s;cursor:default;position:relative}
.gw-bar:hover{opacity:1}
.gw-bar.loss{background:var(--shame)}.gw-bar.draw{background:var(--gold)}

/* ── HOF ── */
.hg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.hc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.ht{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:12px}
.ht.g{color:var(--gold)}.ht.s{color:var(--shame)}
.hr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.hr:last-child{border-bottom:none}
.hrk{font-size:17px;min-width:26px}.hpl{font-size:14px;font-weight:500;flex:1}
.hct{font-family:'DM Mono',monospace;font-size:14px;font-weight:600}.hct.g{color:var(--gold)}.hct.s{color:var(--shame)}

/* ── RULES ── */
.rules-box{background:var(--bg2);border:1px solid rgba(0,255,133,.15);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.rules-box h3{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green);letter-spacing:1px;margin-bottom:10px}
.rule-step{display:flex;gap:10px;margin-bottom:8px;font-size:13px;color:var(--muted);line-height:1.5}
.rule-step .num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green);min-width:24px;line-height:1.2}

/* ── MISC ── */
.info-box{background:var(--bg2);border:1px solid rgba(0,255,133,.2);border-radius:12px;padding:13px 16px;margin-bottom:18px;font-size:13px;line-height:1.5}
.fnote{margin-top:8px;font-size:11px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
.loading-msg{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.tag.pos{background:rgba(0,255,133,.1);color:var(--green)}.tag.neg{background:rgba(255,68,68,.1);color:var(--shame)}
.tag.sh{background:rgba(245,200,66,.1);color:#c8a000}.tag.sk{background:rgba(255,68,68,.15);color:var(--shame)}

@media(max-width:640px){
  .hg{grid-template-columns:1fr}.pg{grid-template-columns:1fr}.barr{display:none}
  .mcard-grid{grid-template-columns:1fr}.hm{display:none}
  .mcard-header{flex-direction:column;text-align:center}
}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="update-bar">
  <span id="update-status"><span class="spinner"></span>Načítám data...</span>
  <span id="update-time"></span>
</div>

<nav class="nav">
  <a class="nav-logo" href="#">LAMY<span>Z&nbsp;PANAMY</span></a>
  <div class="nav-tabs">
    <button class="nt active" onclick="show('standings',this)">Tabulka</button>
    <button class="nt" onclick="show('playoff',this)">Playoff</button>
    <button class="nt" onclick="show('managers',this)">Manažeři</button>
    <button class="nt" onclick="show('stats',this)">Statistiky</button>
    <button class="nt" onclick="show('hof',this)">Hall of Fame</button>
    <button class="nt" onclick="show('history',this)">Archiv</button>
    <button class="nt" onclick="show('rules',this)">Pravidla</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Přepnout téma">🌙</button>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow"><span class="ldot"></span>Liga #83735 · <span id="hero-season">2024/25</span> · GW<span id="hero-gw">38</span></div>
    <h1>Fantasy Lamy<br>z Panamy</h1>
    <div class="hero-sub">Premier League Fantasy · Mini-liga · Sezóna 12</div>
    <div class="kpis">
      <div class="kpi"><span class="kv">8</span><span class="kl">Hráčů</span></div>
      <div class="kpi"><span class="kv" id="hero-gw2">38</span><span class="kl">Aktuální GW</span></div>
      <div class="kpi"><span class="kv">12</span><span class="kl">Sezón celkem</span></div>
      <div class="kpi"><span class="kv" id="hero-leader" style="font-size:15px;margin-top:9px">—</span><span class="kl">Lídr sezóny</span></div>
    </div>
  </div>
</div>

<div class="sec active" id="s-standings"><div class="loading-msg"><span class="spinner"></span>Načítám...</div></div>
<div class="sec" id="s-playoff"><div class="loading-msg"><span class="spinner"></span>Načítám...</div></div>
<div class="sec" id="s-managers"><div class="loading-msg"><span class="spinner"></span>Načítám...</div></div>
<div class="sec" id="s-stats"><div class="loading-msg"><span class="spinner"></span>Načítám...</div></div>
<div class="sec" id="s-hof"></div>
<div class="sec" id="s-history"></div>
<div class="sec" id="s-rules"></div>

<script>
// ── STATIC DATA ──────────────────────────────────────────────────────────
const PLAYERS_STATIC = {

    strengths:['5× Shiva 🐐','Playoff veterán','H2H vs Palán 5:0'],

    strengths:['118 pts GW33 – rekord!','Nejvíce FPL bodů (2135)'],

  155266: {short:'MV',emoji:'⚔️',shiva:1,sacko:1,
    caption:'Martin Válek pojmenoval tým Fusswaffe – nožní zbraň. Bohužel zapomněl, že zbraně někdy také střílí do vlastní nohy. Ve Shiva finále proti Holubovi si kope zákulisní válku statistik a pochybných captainů.',
    strengths:['Shiva finále GW38!','H2H vs Holub 4:1'],

let DATA = null;

// ── THEME ─────────────────────────────────────────────────────────────────
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next==='dark' ? '🌙' : '☀️';
  localStorage.setItem('lamy-theme', next);
}
(function(){
  const saved = localStorage.getItem('lamy-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', ()=>{
    document.getElementById('theme-btn').textContent = saved==='dark' ? '🌙' : '☀️';
  });
})();

// ── HELPERS ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function show(id, btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
  $('s-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(DATA && !rendered[id]) renderSection(id);
}
function fmt(n){ return Number(n).toLocaleString('cs'); }
function mono(v){ return `<span style="font-family:'DM Mono',monospace">${v}</span>`; }

// ── LOAD DATA ─────────────────────────────────────────────────────────────
async function loadData(){
  try {
    const cb = Math.floor(Date.now()/3600000);
    const res = await fetch(`data/season.json?v=${cb}`);
    DATA = await res.json();
    const upd = new Date(DATA.meta.updated_at);
    $('update-status').textContent = '✅ Data aktuální';
    $('update-time').textContent = `Aktualizováno: ${upd.toLocaleString('cs-CZ')}`;
    $('hero-gw').textContent = DATA.meta.current_gw;
    $('hero-gw2').textContent = DATA.meta.current_gw;
    $('hero-season').textContent = DATA.meta.season;
    if(DATA.standings?.length) $('hero-leader').textContent = DATA.standings[0].name.split(' ')[1];
    renderSection('standings');
    renderHoF(); renderHistory(); renderRules();
  } catch(e){
    $('update-status').textContent = '⚠ Nepodařilo se načíst data – zobrazuji statická data';
    // fallback to static
    DATA = { meta:{current_gw:38,season:'2024/25',updated_at:new Date().toISOString()},
             standings: STANDINGS_FALLBACK, standings_with_results: STANDINGS_FALLBACK,
             h2h: H2H_FALLBACK, records:{top10:TOP10_FALLBACK,bottom5:BOT5_FALLBACK},
             series: SERIES_FALLBACK, playoff:{shiva_sf:SF_FALLBACK,shiva_final:[],playout_sf:PLAYOUT_FALLBACK},
             picks:{} };
    $('hero-gw').textContent = '38';
    $('hero-gw2').textContent = '38';
    if(DATA.standings?.length) $('hero-leader').textContent = DATA.standings[0].name.split(' ')[1];
    renderSection('standings');
    renderHoF(); renderHistory(); renderRules();
  }
}

function renderSection(id){
  if(!DATA || rendered[id]) return;
  rendered[id] = true;
  if(id==='standings') renderStandings();
  if(id==='playoff')   renderPlayoff();
  if(id==='managers')  renderManagers();
  if(id==='stats')     renderStats();
}

// ── MANAGERS ──────────────────────────────────────────────────────────────
function renderManagers(){
  const s = DATA.standings_with_results || DATA.standings || [];
  if(!s.length){ $('s-managers').innerHTML='<div class="loading-msg">Žádná data</div>'; return; }

  const picks = DATA.picks || {};
  const maxPts = Math.max(...s.map(p=>{
    const res = (p.results||[]).filter(r=>r.gw<=36);
    return res.length ? Math.max(...res.map(r=>r.fpl)) : 100;
  }));

  // Build tabs
  const tabs = s.map((p,i)=>{
    const info = PLAYERS_STATIC[p.entry]||{short:'??',emoji:'❓'};
    return `<button class="mtab ${i===0?'active':''}" onclick="switchManager(${p.entry}, this)">
      <span class="mtab-avatar">${info.emoji}</span>${p.name.split(' ')[1]||p.name}
    </button>`;
  }).join('');

  // Build panels
  const panels = s.map((p,i)=>{
    const info = PLAYERS_STATIC[p.entry]||{short:'??',emoji:'❓',caption:'',strengths:[],weaknesses:[]};
    const epicks = picks[p.entry] || picks[String(p.entry)] || {};
    const results = (p.results||[]).filter(r=>r.gw<=36).sort((a,b)=>a.gw-b.gw);

    // GW chart bars
    const bars = results.map(r=>{
      const h = Math.max(4, Math.round((r.fpl/maxPts)*60));
      return `<div class="gw-bar ${r.result}" style="height:${h}px" title="GW${r.gw}: ${r.fpl} pts (${r.result})"></div>`;
    }).join('');

    // Captain stats from picks
    const capCounts = {};
    let totalChips = {bboost:0, triple:0, freehit:0};
    let chipGws = [];
    Object.entries(epicks).forEach(([gw, gwData])=>{
      if(parseInt(gw)>36) return;
      const cn = gwData.captain_name || gwData.captain;
      if(cn) capCounts[cn] = (capCounts[cn]||0)+1;
      if(gwData.active_chip){
        const chip = gwData.active_chip;
        if(chip==='bboost'||chip==='bench_boost') totalChips.bboost++;
        else if(chip==='3xc'||chip==='triple_captain') totalChips.triple++;
        else if(chip==='freehit'||chip==='free_hit') totalChips.freehit++;
        chipGws.push({gw:parseInt(gw), chip});
      }
    });

    const topCaps = Object.entries(capCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const maxCapCount = topCaps[0]?.[1]||1;

    const capBars = topCaps.map(([name,cnt])=>`
      <div class="cap-bar">
        <span class="cap-bar-name">${name}</span>
        <div style="flex:1;margin:0 8px;background:var(--bg3);border-radius:3px;height:6px">
          <div class="cap-bar-fill" style="width:${Math.round(cnt/maxCapCount*100)}%"></div>
        </div>
        <span class="cap-bar-count">${cnt}×</span>
      </div>`).join('') || '<div style="color:var(--muted);font-size:13px">Data načtena po spuštění Actions</div>';

    const chipHtml = chipGws.map(c=>{
      const label = c.chip==='bboost'||c.chip==='bench_boost'?'Bench Boost':
                    c.chip==='3xc'||c.chip==='triple_captain'?'Triple Captain':
                    c.chip==='freehit'||c.chip==='free_hit'?'Free Hit':'Wildcard';
      const cls = c.chip.includes('boost')?'bboost':c.chip.includes('3x')||c.chip.includes('triple')?'triple':c.chip.includes('free')?'freehit':'wc';
      return `<span class="chip-badge ${cls}">GW${c.gw}: ${label}</span>`;
    }).join('') || '<span style="color:var(--muted);font-size:13px">–</span>';

    const best5 = [...results].sort((a,b)=>b.fpl-a.fpl).slice(0,5);
    const worst3 = [...results].sort((a,b)=>a.fpl-b.fpl).slice(0,3);
    const avgFpl = results.length ? (results.reduce((s,r)=>s+r.fpl,0)/results.length).toFixed(1) : '–';

    const strengths = (info.strengths||[]).map(s=>`<span class="tag pos">✓ ${s}</span>`).join('');
    const weaknesses = (info.weaknesses||[]).map(w=>`<span class="tag neg">✗ ${w}</span>`).join('');
    const trophies = (info.shiva?`<span class="tag sh">🏆 ${info.shiva}× Shiva</span>`:'')+
                     (info.sacko?`<span class="tag sk">💩 ${info.sacko}× Sacko</span>`:'');

    return `<div class="manager-panel ${i===0?'active':''}" id="mp-${p.entry}">
      <div class="mcard-header">
        <div class="mcard-avatar">${info.emoji}</div>
        <div class="mcard-info">

function switchManager(entry, btn){
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.manager-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById(`mp-${entry}`);
  if(panel) panel.classList.add('active');
}

// ── STATS ─────────────────────────────────────────────────────────────────
function renderStats(){
  const rec = DATA.records;
  const h2h = DATA.h2h;
  const ser = DATA.series;
  const picks = DATA.picks || {};

  const gw = Math.min(DATA.meta.current_gw||36, 36);

  // Celkové picks statistiky
  const capCounts = {}; // kapitán → počet
  const playerApps = {}; // hráč → počet startů
  let chipStats = {bboost:0, triple:0, freehit:0, wc:0};

  Object.values(picks).forEach(managerPicks=>{
    Object.entries(managerPicks).forEach(([gw, gwData])=>{
      if(parseInt(gw)>36) return;
      // Kapitáni
      const cn = gwData.captain_name || gwData.captain;
      if(cn) capCounts[cn] = (capCounts[cn]||0)+1;
      // Chipy
      if(gwData.active_chip){
        const c = gwData.active_chip;
        if(c.includes('boost')) chipStats.bboost++;
        else if(c.includes('3x')||c.includes('triple')) chipStats.triple++;
        else if(c.includes('free')) chipStats.freehit++;
        else chipStats.wc++;
      }
    });
  });

  const topCaps = Object.entries(capCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const top10rows = (rec?.top10||[]).map((s,i)=>`<tr>
    <td style="font-family:'DM Mono',monospace;color:var(--muted)">${i+1}</td>
    <td style="font-weight:500">${s.name}</td>
    <td style="font-size:12px;color:var(--muted)" class="hm">${s.team}</td>
    <td style="font-family:'DM Mono',monospace">GW${s.gw}</td>
    <td><span style="font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--gold)">${s.pts}</span></td>
    <td class="hm" style="font-size:12px;color:var(--muted)">vs ${s.opp||'–'}</td>
  </tr>`).join('');

  const bot5rows = (rec?.bottom5||[]).map((s,i)=>`<tr>
    <td style="font-family:'DM Mono',monospace;color:var(--muted)">${i+1}</td>
    <td style="font-weight:500">${s.name}</td>
    <td style="font-family:'DM Mono',monospace">GW${s.gw}</td>
    <td><span style="font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--shame)">${s.pts}</span></td>
  </tr>`).join('');

  const order = (DATA.standings||[]).map(p=>String(p.entry));
  const sn = {}; (DATA.standings||[]).forEach(p=>sn[p.entry]=p.name.split(' ')[1]||p.name);
  let h2html = '<tr><th>↓ vs →</th>'+order.map(e=>`<th>${sn[e]||e}</th>`).join('')+'</tr>';
  order.forEach(e1=>{
    h2html+=`<tr><th class="hn">${sn[e1]||e1}</th>`;
    order.forEach(e2=>{
      if(e1===e2){h2html+='<td class="self">—</td>';return;}
      const r=(h2h?.[e1]||{})[e2]||{w:0,l:0,d:0};
      const cls=r.w>r.l?'win':r.w<r.l?'loss':r.w>0?'draw':'';
      h2html+=`<td class="${cls}" title="${r.w}V ${r.d||0}R ${r.l}P">${r.w}:${r.l}</td>`;
    });
    h2html+='</tr>';
  });

  const serRows = (ser||[]).map(p=>{
    const col=p.current?.includes('W')?'var(--green)':p.current?.includes('L')?'var(--shame)':'#c8a000';
    return `<tr><td style="font-weight:500">${p.name}</td>
      <td style="font-family:'DM Mono',monospace;color:var(--green)">${p.best_w}× W</td>
      <td style="font-family:'DM Mono',monospace;color:var(--shame)">${p.best_l}× L</td>
      <td style="font-family:'DM Mono',monospace;color:${col}">${p.current}</td></tr>`;
  }).join('');

  const capRows = topCaps.length
    ? topCaps.map(([name,cnt],i)=>`<tr>
        <td style="font-family:'DM Mono',monospace;color:var(--muted)">${i+1}</td>
        <td style="font-weight:500">${name}</td>
        <td><span style="font-family:'DM Mono',monospace;color:var(--green);font-weight:600">${cnt}×</span></td>
      </tr>`).join('')
    : '<tr><td colspan="3" style="color:var(--muted);font-size:13px;text-align:center">Data dostupná po spuštění GitHub Actions (picks endpoint)</td></tr>';

  $('s-stats').innerHTML = `
    <div class="st"><span class="a">Statistiky</span> sezóny 2024/25<span class="d">GW1–${gw}</span></div>
    <div class="sub">Rekordy – nejvyšší GW skóre</div>
    <div class="tw"><table><thead><tr><th>#</th><th>Hráč</th><th class="hm">Tým</th><th>GW</th><th>FPL pts</th><th class="hm">Soupeř</th></tr></thead><tbody>${top10rows}</tbody></table></div>
    <div class="div"></div>
    <div class="sub">Rekordy – nejhorší GW skóre</div>
    <div class="tw"><table><thead><tr><th>#</th><th>Hráč</th><th>GW</th><th>FPL pts</th></tr></thead><tbody>${bot5rows}</tbody></table></div>
    <div class="div"></div>
    <div class="sub">Head-to-Head bilance (výhry : prohry)</div>
    <div class="h2w"><table class="h2t">${h2html}</table></div>
    <div class="div"></div>
    <div class="sub">Série výher a proher</div>
    <div class="tw"><table><thead><tr><th>Hráč</th><th>Nejdelší W</th><th>Nejdelší L</th><th>Aktuální forma</th></tr></thead><tbody>${serRows}</tbody></table></div>
    <div class="div"></div>
    <div class="sub">Nejoblíbenější kapitáni ligy (celkem)</div>
    <div class="tw"><table><thead><tr><th>#</th><th>Hráč PL</th><th>Počet captainů</th></tr></thead><tbody>${capRows}</tbody></table></div>
    <div class="div"></div>
    <div class="sub">Přehled použitých chipů</div>
    <div class="sg">
      <div class="sc n"><div class="v">${chipStats.bboost||'–'}</div><div class="lb">Bench Boost použit</div><div class="nm">v celé lize</div></div>
      <div class="sc g"><div class="v">${chipStats.triple||'–'}</div><div class="lb">Triple Captain</div><div class="nm">v celé lize</div></div>
      <div class="sc p"><div class="v">${chipStats.freehit||'–'}</div><div class="lb">Free Hit</div><div class="nm">v celé lize</div></div>
      <div class="sc s"><div class="v">${chipStats.wc||'–'}</div><div class="lb">Wildcard</div><div class="nm">v celé lize</div></div>
    </div>`;
}
