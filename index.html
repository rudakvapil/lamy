<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Lamy z Panamy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#00ff85;--pk:#e90052;--go:#f5c842;--sv:#b0b0b0;--sh:#ff4444;--br:#cd7f32;
  --bg:#0d0d14;--b2:#16161f;--b3:#1e1e2a;--b4:#252535;
  --bo:rgba(255,255,255,.08);--b2o:rgba(255,255,255,.14);
  --tx:#f0f0f0;--mu:rgba(240,240,240,.45);--m2:rgba(240,240,240,.22);
  --r:12px;--rs:8px;--fh:'Bebas Neue',sf;--fb:'DM Sans',sf;--fm:'DM Mono',mono}
[data-theme="light"]{--g:#00a855;--pk:#e90052;--go:#c49a00;--sh:#cc2222;
  --bg:#f4f4f0;--b2:#fff;--b3:#ebebе7;--b4:#e0e0dc;
  --bo:rgba(0,0,0,.09);--b2o:rgba(0,0,0,.16);
  --tx:#1a1a1a;--mu:rgba(0,0,0,.45);--m2:rgba(0,0,0,.2)}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:15px;line-height:1.6;min-height:100vh;transition:background .2s,color .2s}
/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--b2);backdrop-filter:blur(16px);border-bottom:1px solid var(--bo);display:flex;align-items:center;padding:0 16px;height:54px;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
[data-theme="dark"] .nav{background:rgba(13,13,20,.96)}
.logo{font-family:var(--fh);font-size:20px;letter-spacing:1px;color:var(--g);margin-right:auto;white-space:nowrap;text-decoration:none}
.logo span{color:var(--pk)}
.tabs{display:flex;gap:2px;overflow-x:auto}.tabs::-webkit-scrollbar{display:none}
.nt{background:none;border:none;cursor:pointer;padding:5px 10px;border-radius:6px;color:var(--mu);font-family:var(--fb);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
.nt:hover{color:var(--tx);background:var(--b3)}.nt.active{color:var(--g);background:rgba(0,192,96,.12)}
.tbtn{background:var(--b3);border:1px solid var(--bo);border-radius:20px;padding:3px 10px;cursor:pointer;font-size:12px;color:var(--mu);transition:all .2s;flex-shrink:0}
.tbtn:hover{color:var(--tx)}
/* UPDATE BAR */
.ubar{background:var(--b3);border-bottom:1px solid var(--bo);padding:4px 20px;font-size:11px;color:var(--mu);display:flex;justify-content:space-between}
/* HERO */
.hero{position:relative;overflow:hidden;padding:44px 20px 32px;border-bottom:1px solid var(--bo)}
[data-theme="dark"] .hero{background:radial-gradient(ellipse at 50% 0%,#1a0025 0%,var(--bg) 70%)}
[data-theme="light"] .hero{background:linear-gradient(135deg,#e0f0ff,var(--bg) 70%)}
.hi{position:relative;max-width:880px;margin:0 auto;text-align:center}
.ey{display:inline-flex;align-items:center;gap:8px;margin-bottom:12px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--g);border:1px solid rgba(0,192,96,.3);padding:3px 12px;border-radius:20px;background:rgba(0,192,96,.06)}
.ld{width:6px;height:6px;border-radius:50%;background:var(--pk);animation:pd 1.5s infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{font-family:var(--fh);font-size:clamp(38px,8vw,78px);letter-spacing:2px;line-height:.95;margin-bottom:6px}
[data-theme="dark"] .hero h1{background:linear-gradient(135deg,#fff 0%,var(--g) 55%,#aaffdd 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
[data-theme="light"] .hero h1{color:var(--tx)}
.hs{font-size:12px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:22px}
.kpis{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.kpi{text-align:center}.kv{font-family:var(--fh);font-size:30px;color:var(--g);display:block;line-height:1}
.kl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
/* SECTIONS */
.sec{padding:20px 20px;max-width:1040px;margin:0 auto;display:none}.sec.active{display:block}
.st{font-family:var(--fh);font-size:22px;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.st .a{color:var(--g)}.st .d{color:var(--mu);font-size:13px;font-family:var(--fb);font-weight:400}
/* TABLES */
.tw{border-radius:var(--r);overflow:hidden;border:1px solid var(--bo);background:var(--b2)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mu);padding:8px 12px;text-align:left;background:var(--b3);border-bottom:1px solid var(--bo)}
td{padding:10px 12px;border-bottom:1px solid var(--bo);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(128,128,128,.04)}
tr.z1 td:first-child{border-left:3px solid var(--go)}tr.z2 td:first-child{border-left:3px solid var(--g)}tr.z3 td:first-child{border-left:3px solid var(--sh)}
.lp{font-family:var(--fm);font-size:13px;font-weight:500;padding:2px 7px;border-radius:5px}
.lp.t{background:rgba(0,192,96,.1);color:var(--g)}.lp.m{background:rgba(212,168,0,.1);color:var(--go)}.lp.b{background:rgba(204,51,51,.1);color:var(--sh)}
.frow{display:flex;gap:3px}.fd{width:8px;height:8px;border-radius:50%}
.fd.W{background:var(--g)}.fd.L{background:var(--sh)}.fd.D{background:var(--go)}
/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:16px}
.sc{background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.g::before{background:var(--go)}.sc.n::before{background:var(--g)}.sc.s::before{background:var(--sh)}.sc.p::before{background:var(--pk)}.sc.b::before{background:var(--br)}
.sc .v{font-family:var(--fh);font-size:30px;line-height:1;margin-bottom:2px}
.sc.g .v{color:var(--go)}.sc.n .v{color:var(--g)}.sc.s .v{color:var(--sh)}.sc.p .v{color:var(--pk)}.sc.b .v{color:var(--br)}
.sc .lb{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px}.sc .nm{font-size:12px;font-weight:500;margin-top:4px}
/* H2H TABLE */
.h2w{overflow-x:auto}.h2t{border-collapse:collapse;font-size:12px;min-width:500px}
.h2t th,.h2t td{padding:6px 8px;text-align:center;border:1px solid var(--bo)}
.h2t th{background:var(--b3);color:var(--mu);font-size:10px;text-transform:uppercase}
.h2t .hn{text-align:left;font-weight:500;color:var(--tx);background:var(--b3);white-space:nowrap}
.h2t .win{color:var(--g);font-weight:600}.h2t .loss{color:var(--sh)}.h2t .draw{color:var(--go)}.h2t .self{background:var(--b4);color:var(--m2)}
/* PLAYOFF BRACKET */
.pg{display:grid;grid-template-columns:1fr 28px 1fr;gap:0;align-items:start;margin-bottom:24px}
.bm{background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.bm.shiva{border-color:rgba(212,168,0,.4)}.bm.sacko{border-color:rgba(204,51,51,.35)}.bm.fin{border-color:rgba(0,192,96,.4)}.bm.pl{border-color:rgba(136,136,136,.25)}
.bh{padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.bh.sh{background:rgba(212,168,0,.08);color:var(--go)}.bh.sk{background:rgba(204,51,51,.08);color:var(--sh)}
.bh.plo{background:rgba(136,136,136,.06);color:var(--sv)}.bh.fsh{background:rgba(212,168,0,.12);color:var(--go)}
.bh.fsk{background:rgba(204,51,51,.12);color:var(--sh)}
.be{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bo)}
.be.w{background:rgba(0,192,96,.05)}.be.l{opacity:.5}
.bn{font-size:13px;font-weight:500}.bt{font-size:11px;color:var(--mu)}
.nask{font-size:11px;font-weight:600}.nask.pos{color:var(--g)}.nask.neg{color:var(--sh)}
.bpts{font-family:var(--fm);font-size:12px;color:var(--mu)}.bpts.lv{color:var(--go)}
.barr{display:flex;align-items:center;justify-content:center;color:var(--m2);font-size:18px;padding-top:50px}
.bnote{font-size:11px;color:var(--mu);padding:6px 12px;border-top:1px solid var(--bo);font-style:italic}
.vrow{background:rgba(0,192,96,.04);border-top:1px solid var(--bo);padding:5px 12px;font-size:11px;color:var(--mu);font-family:var(--fm)}
.tbadge{font-size:10px;padding:2px 6px;border-radius:4px}
.tbadge.done{background:rgba(0,192,96,.1);color:var(--g)}.tbadge.lv{background:var(--pk);color:#fff;animation:pd 1.5s infinite}.tbadge.tbd{background:rgba(212,168,0,.1);color:var(--go)}
.colt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);text-align:center;margin-bottom:8px}
/* GW BAR CHART */
.gw-chart{display:flex;align-items:flex-end;gap:2px;height:60px;background:var(--b3);border-radius:var(--rs);padding:6px 8px;overflow:hidden}
.gw-bar{border-radius:2px 2px 0 0;min-width:4px;flex:1;cursor:pointer;transition:opacity .15s}
.gw-bar.W{background:var(--g)}.gw-bar.L{background:var(--sh)}.gw-bar.D{background:var(--go)}
.gw-bar:hover{opacity:.7}
/* MANAGER PROFILES */
.mtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.mtab{background:var(--b2);border:1px solid var(--bo);border-radius:30px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:500;color:var(--mu);transition:all .15s}
.mtab:hover{border-color:var(--b2o);color:var(--tx)}.mtab.active{background:var(--g);color:#000;border-color:var(--g);font-weight:700}
.mpanel{display:none;background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);overflow:hidden}
.mpanel.active{display:block}
.mhead{padding:22px 20px;display:flex;gap:20px;align-items:flex-start;border-bottom:1px solid var(--bo);position:relative}
.mav{flex-shrink:0;width:90px;height:90px;border-radius:14px;background:var(--b3);display:flex;align-items:center;justify-content:center;font-size:52px;border:2px solid var(--b2o)}
.mname{font-family:var(--fh);font-size:26px;letter-spacing:1px;margin-bottom:2px}
.mteam{font-size:12px;color:var(--mu);margin-bottom:8px}
.mbio{font-size:12px;color:var(--mu);font-style:italic;line-height:1.5;max-width:480px;margin-bottom:10px}
.mbadges{display:flex;gap:5px;flex-wrap:wrap}
.mbadge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.mbadge.sh{background:rgba(212,168,0,.12);color:var(--go);border:1px solid rgba(212,168,0,.25)}
.mbadge.sk{background:rgba(204,51,51,.1);color:var(--sh);border:1px solid rgba(204,51,51,.2)}
.mbadge.ok{background:rgba(0,192,96,.1);color:var(--g);border:1px solid rgba(0,192,96,.2)}
.mpos{position:absolute;top:16px;right:16px;font-family:var(--fh);font-size:44px;color:var(--bo);line-height:1}
.mbody{padding:18px 20px}
.mstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:16px}
.ms{background:var(--b3);border-radius:var(--rs);padding:8px;text-align:center}
.ms .v{font-family:var(--fm);font-size:16px;font-weight:500;display:block;line-height:1.2}
.ms .l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.msec{margin-bottom:16px}
.msec h4{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:8px;padding-left:8px;border-left:2px solid var(--g)}
.pl-chip{display:inline-flex;align-items:center;gap:4px;background:var(--b3);border:1px solid var(--bo);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500;margin:2px}
.pl-chip.top1{border-color:var(--go);background:rgba(212,168,0,.08);color:var(--go)}
.pl-chip.top2{border-color:var(--sv);background:rgba(136,136,136,.08)}
.pl-chip .pgws{font-size:10px;color:var(--mu);font-family:var(--fm)}
.chip-tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:5px;margin:2px;font-weight:500}
.chip-tag.bb{border:1px solid rgba(0,192,96,.3);color:var(--g);background:rgba(0,192,96,.06)}
.chip-tag.tc{border:1px solid rgba(212,168,0,.3);color:var(--go);background:rgba(212,168,0,.06)}
.chip-tag.fh{border:1px solid rgba(233,0,82,.3);color:var(--pk);background:rgba(233,0,82,.06)}
.chip-tag.wc{border:1px solid rgba(136,136,136,.3);color:var(--sv);background:rgba(136,136,136,.06)}
.cap-bar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cap-bar-name{font-size:12px;font-weight:500;min-width:75px}
.cap-bar-track{flex:1;background:var(--b3);border-radius:3px;height:5px}
.cap-bar-fill{height:5px;border-radius:3px;background:var(--g)}
.cap-bar-count{font-family:var(--fm);font-size:11px;color:var(--mu)}
/* TITULY SEKCE */
.awards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.award-card{background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.award-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.award-card.gold::before{background:var(--go)}.award-card.green::before{background:var(--g)}
.award-card.shame::before{background:var(--sh)}.award-card.pink::before{background:var(--pk)}
.award-card.blue::before{background:#4488ff}.award-card.purple::before{background:#8844ff}
.award-emoji{font-size:28px;margin-bottom:8px;display:block}
.award-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:4px}
.award-winner{font-size:16px;font-weight:700;margin-bottom:2px}
.award-detail{font-size:12px;color:var(--mu)}
/* FORM TABLE */
.form-tabs{display:flex;gap:4px;margin-bottom:12px}
.form-tab{background:var(--b3);border:1px solid var(--bo);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--mu);transition:all .15s}
.form-tab.active{background:var(--g);color:#000;border-color:var(--g);font-weight:600}
/* DUEL */
.duel-select{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.duel-sel{background:var(--b2);border:1px solid var(--bo);border-radius:var(--rs);padding:8px 12px;font-family:var(--fb);font-size:13px;color:var(--tx);cursor:pointer;flex:1;min-width:140px}
.duel-sel:focus{outline:none;border-color:var(--g)}
.duel-vs{background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:20px;margin-bottom:16px}
.duel-header{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;text-align:center;margin-bottom:20px}
.duel-name{font-family:var(--fh);font-size:22px;letter-spacing:1px}
.duel-emoji{font-size:44px}
.duel-vs-badge{font-family:var(--fh);font-size:24px;color:var(--mu);text-align:center}
.duel-stat-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--bo)}
.duel-stat-row:last-child{border-bottom:none}
.duel-val{font-family:var(--fm);font-size:15px;font-weight:600}
.duel-val.win{color:var(--g)}.duel-val.loss{color:var(--sh)}.duel-val.tie{color:var(--mu)}
.duel-label{font-size:11px;color:var(--mu);text-align:center;text-transform:uppercase;letter-spacing:.5px}
.duel-bar-wrap{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:4px 0}
.duel-bar-a{background:var(--g);transition:width .5s}.duel-bar-b{background:var(--sh);flex:1}
/* GW DUEL CHART */
.gw-duel{display:flex;align-items:flex-end;gap:1px;height:60px;margin-top:8px}
.gw-duel-bar{flex:1;border-radius:1px 1px 0 0;position:relative;cursor:pointer}
.gw-duel-bar.win{background:rgba(0,255,133,.6)}.gw-duel-bar.loss{background:rgba(255,68,68,.5)}.gw-duel-bar.draw{background:rgba(245,200,66,.5)}
/* PREDICTIONS */
.pred-card{background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:18px;margin-bottom:12px}
.pred-vs{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:14px}
.pred-name{font-weight:600;font-size:14px}
.pred-avg{font-size:11px;color:var(--mu);font-family:var(--fm)}
.pred-prob{font-family:var(--fh);font-size:28px}
.pred-prob.fav{color:var(--g)}.pred-prob.dog{color:var(--sh)}.pred-prob.even{color:var(--go)}
.pred-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:8px}
.pred-bar-a{background:var(--g);transition:width .6s}.pred-bar-b{background:var(--sh);flex:1}
.pred-factors{font-size:11px;color:var(--mu);display:flex;flex-wrap:wrap;gap:8px}
.pred-factor{background:var(--b3);border-radius:4px;padding:2px 8px}
/* LIVE GW */
.live-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.live-card{background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:14px;position:relative}
.live-card.leading{border-color:rgba(0,192,96,.4)}
.live-card.trailing{border-color:rgba(255,68,68,.3)}
.live-score{font-family:var(--fh);font-size:32px;color:var(--g);line-height:1}
.live-name{font-size:13px;font-weight:500;margin-bottom:2px}
.live-team{font-size:11px;color:var(--mu)}
.live-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.live-badge.lead{background:rgba(0,192,96,.1);color:var(--g)}
.live-badge.trail{background:rgba(255,68,68,.1);color:var(--sh)}
.live-badge.draw{background:rgba(245,200,66,.1);color:var(--go)}
/* CAREER TIMELINE */
.career-row{display:flex;gap:4px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.career-season{font-size:11px;color:var(--mu);font-family:var(--fm);min-width:72px}
.career-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.career-dot.shiva{background:rgba(212,168,0,.15);border:1px solid var(--go)}
.career-dot.sacko{background:rgba(255,68,68,.1);border:1px solid var(--sh)}
.career-dot.mid{background:var(--b3);border:1px solid var(--bo);color:var(--mu);font-size:10px;font-family:var(--fm)}
/* HOF */
.hg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.hc{background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.ht{font-family:var(--fh);font-size:17px;letter-spacing:1px;margin-bottom:10px}
.ht.g{color:var(--go)}.ht.s{color:var(--sh)}
.hr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bo)}
.hr:last-child{border-bottom:none}
.hrk{font-size:16px;min-width:24px}.hpl{font-size:13px;font-weight:500;flex:1}
.hct{font-family:var(--fm);font-size:13px;font-weight:600}.hct.g{color:var(--go)}.hct.s{color:var(--sh)}
/* RULES */
.rbox{background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.rbox h3{font-family:var(--fh);font-size:17px;color:var(--g);letter-spacing:1px;margin-bottom:8px}
.rstep{display:flex;gap:8px;margin-bottom:7px;font-size:13px;color:var(--mu);line-height:1.5}
.rstep .num{font-family:var(--fh);font-size:17px;color:var(--g);min-width:22px;line-height:1.2}
/* MISC */
.div{height:1px;background:var(--bo);margin:16px 0}
.sub{font-size:14px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sub::before{content:'';display:inline-block;width:3px;height:13px;background:var(--g);border-radius:2px}
.ibox{background:var(--b2);border:1px solid rgba(0,192,96,.2);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px;line-height:1.5}
.fnote{margin-top:8px;font-size:11px;color:var(--mu);display:flex;gap:12px;flex-wrap:wrap}
.ldg{display:inline-block;width:14px;height:14px;border:2px solid var(--bo);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.lmsg{text-align:center;padding:32px;color:var(--mu);font-size:14px}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;display:inline-block;margin:1px}
.tag.pos{background:rgba(0,192,96,.1);color:var(--g)}.tag.neg{background:rgba(255,68,68,.1);color:var(--sh)}
.tag.sh{background:rgba(212,168,0,.1);color:var(--go)}.tag.sk{background:rgba(255,68,68,.15);color:var(--sh)}
@media(max-width:640px){.hg{grid-template-columns:1fr}.pg{grid-template-columns:1fr}.barr{display:none}.hm{display:none}.mhead{flex-direction:column}.mav{width:70px;height:70px}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bo);border-radius:2px}

<script>
// ── STATICKÁ DATA ──────────────────────────────────────────────────────────

  167387: {e:'🧘',caption:'Yobagoya – nikdo neví co to znamená. Bureš hraje s klidem Buda. 2× Shiva, 0× Sacko je nejčistší kariéra v celé lize. Letos vypadl v SF.',shiva:2,sacko:0,strengths:['2× Shiva','0× Sacko (rekord čistoty)','H2H vs Krautwurm 5:0'],weaknesses:['SF prohra 69:78'],quote:'"Yobagoya neexistuje v tomto světě."'},

  472208: {e:'🧊',caption:'Eskimo brothers sdílejí všechno – i smůlu. 2× Shiva champion ale tato sezóna ho strhla do Sacko finále. GW17 na 96 bodů byl záblesk génia uprostřed chaosu.',shiva:2,sacko:1,strengths:['2× Shiva v historii','Dominantní GW16–17'],weaknesses:['Sacko finále GW38','H2H vs Holub 0:5'],quote:'"Brothers share everything."'},
  184202: {e:'🎄',caption:'Krampus přichází v červenci a ptá se jestli jsou Vánoce. GW34 na 12 bodů – historické dno. Ale GW37 Bench Boost na 85 bodů ho zachránil. 3× Sacko champion.',shiva:0,sacko:3,strengths:['Přežil playout SF (85pts)','Nečekané výbuchy formy'],weaknesses:['3× Sacko 🤡','GW34: 12 pts'],quote:'"Sacko je moje životní mise."'},

const HOF_DATA=[
  {name:'Martin Holub',shiva:5,sacko:1},{name:'Marek Palán',shiva:2,sacko:1},
  {name:'Jaroslav Bureš',shiva:2,sacko:0},{name:'Rudolf Kvapil',shiva:1,sacko:0},
  {name:'Martin Válek',shiva:1,sacko:1},{name:'Lukáš Kapinus',shiva:1,sacko:0},

];

const HISTORY=[
  {n:1,s:'2013/2014',sh:'Martin Holub',sa:'Michal Krautwurm'},
  {n:2,s:'2014/2015',sh:'Rudolf Kvapil',sa:'Vojtěch Raiman'},

  {n:6,s:'2018/2019',sh:'Lukáš Kapinus',sa:'Libor Pechoč'},
  {n:7,s:'2019/2020',sh:'Jaroslav Bureš',sa:'Martin Válek'},
  {n:8,s:'2020/2021',sh:'Martin Holub',sa:'Marek Palán'},
  {n:9,s:'2021/2022',sh:'Jaroslav Bureš',sa:'Michal Krautwurm'},
  {n:10,s:'2022/2023',sh:'Marek Palán',sa:'Martin Holub'},
  {n:11,s:'2023/2024',sh:'Martin Holub',sa:'Michal Krautwurm'},
  {n:12,s:'2024/2025',sh:'???',sa:'???',cur:true},
];

const CHIP_L={'bboost':'Bench Boost','bench_boost':'Bench Boost','3xc':'Triple Captain','triple_captain':'Triple Captain','freehit':'Free Hit','free_hit':'Free Hit','wildcard':'Wildcard'};
const CHIP_C={'bboost':'bb','bench_boost':'bb','3xc':'tc','triple_captain':'tc','freehit':'fh','free_hit':'fh','wildcard':'wc'};

// ── STATE ──────────────────────────────────────────────────────────────────
let D=null, rendered={};
const $=id=>document.getElementById(id);
const fm=n=>Number(n||0).toLocaleString('cs');

// ── THEME ──────────────────────────────────────────────────────────────────
function initTheme(){
  const t=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  $('tbtn').textContent=t==='dark'?'☀️':'🌙';
}
function toggleTheme(){
  const c=document.documentElement.getAttribute('data-theme');
  const n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('theme',n);
  $('tbtn').textContent=n==='dark'?'☀️':'🌙';
}
initTheme();

function show(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
  $('s-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(D&&!rendered[id]){rendered[id]=true; render(id);}
}

// ── LOAD ──────────────────────────────────────────────────────────────────
async function load(){
  try{
    const r=await fetch(`data/season.json?v=${Math.floor(Date.now()/3600000)}`);
    D=await r.json();
    const u=new Date(D.meta.updated_at);
    $('ust').textContent='✅ Data aktuální';
    $('utm').textContent=`Aktualizováno: ${u.toLocaleString('cs-CZ')}`;
    $('hgw').textContent=D.meta.current_gw;
    $('hgw2').textContent=D.meta.current_gw;
    $('hseason').textContent=D.meta.season;
    if(D.standings?.length) $('hleader').textContent=D.standings[0].name.split(' ')[1]||D.standings[0].name;
    rendered={}; render('standings');
    renderHoF(); renderHistory(); renderRules();
  }catch(e){
    $('ust').textContent='⚠ Chyba načítání dat';
    console.error(e);
  }
}

function render(id){
  if(id==='standings') renderStandings();
  if(id==='form')      renderForm();
  if(id==='playoff')   renderPlayoff();
  if(id==='live')      renderLive();
  if(id==='awards')    renderAwards();
  if(id==='duel')      renderDuel();
  if(id==='stats')     renderStats();
  if(id==='managers')  renderManagers();
  if(id==='career')    renderCareer();
  if(id==='predict')   renderPredict();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function lastN(results,n){return (results||[]).filter(r=>r.gw<=36).slice(-n);}
function formPts(results){return results.reduce((s,r)=>s+(r.result==='W'?3:r.result==='D'?1:0),0);}
function avgFpl(results){return results.length?+(results.reduce((s,r)=>s+r.fpl,0)/results.length).toFixed(1):0;}
function pm(entry){return (D.picks_stats?.per_manager||{})[entry]||(D.picks_stats?.per_manager||{})[String(entry)]||{};}

// ── 1. STANDINGS ──────────────────────────────────────────────────────────
function renderStandings(){
  const s=D.standings||[];
  const rows=s.map((p,i)=>{
    const zc=i===0?'z1':i<4?'z2':i>=6?'z3':'';
    const lc=i===0?'t':i<4?'m':'b';
    const ic=i===0?'👑':i===1?'🥈':i===2?'🥉':i+1;
    const form=(p.form||[]).map(f=>`<div class="fd ${f}"></div>`).join('');
    return `<tr class="${zc}">
      <td><span style="font-family:var(--fm);font-size:12px;color:var(--mu)">${ic}</span></td>
      <td><div style="font-weight:500">${p.team}</div><div style="font-size:11px;color:var(--mu)">${p.name}</div></td>
      <td style="font-family:var(--fm);color:var(--g)">${p.w}</td>
      <td class="hm" style="font-family:var(--fm);color:var(--go)">${p.d}</td>
      <td style="font-family:var(--fm);color:var(--sh)">${p.l}</td>
      <td><span class="lp ${lc}">${p.pts}</span></td>
      <td class="hm"><span style="font-family:var(--fm);font-size:12px;color:var(--mu)">${fm(p.fpl_total)}</span></td>
      <td><div class="frow">${form}</div></td>
    </tr>`;
  }).join('');
  $('s-standings').innerHTML=`
    <div class="st"><span class="a">Tabulka</span> základní části<span class="d">GW1–36 · finální</span></div>
    <div class="tw"><table><thead><tr><th>#</th><th>Tým / Hráč</th><th>V</th><th class="hm">R</th><th>P</th><th>Body</th><th class="hm">FPL</th><th>Forma</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="fnote"><span><span style="display:inline-block;width:10px;height:2px;background:var(--go);border-radius:1px"></span>#1</span><span><span style="display:inline-block;width:10px;height:2px;background:var(--g);border-radius:1px"></span>Top 4 playoff</span><span><span style="display:inline-block;width:10px;height:2px;background:var(--sh);border-radius:1px"></span>Playout</span></div>
    <div class="sg">
      <div class="sc g"><div class="v">${s[0]?.pts||'–'}</div><div class="lb">Bodů lídr</div><div class="nm">${s[0]?.name||'–'}</div></div>
      <div class="sc n"><div class="v">${fm(Math.max(...s.map(p=>p.fpl_total||0)))}</div><div class="lb">Max FPL bodů</div><div class="nm">${s.find(p=>p.fpl_total===Math.max(...s.map(q=>q.fpl_total||0)))?.name||'–'}</div></div>
      <div class="sc s"><div class="v">${s[s.length-1]?.pts||'–'}</div><div class="lb">Bodů poslední</div><div class="nm">${s[s.length-1]?.name||'–'}</div></div>
      <div class="sc p"><div class="v">${(s[0]?.pts||0)-(s[s.length-1]?.pts||0)}</div><div class="lb">Rozdíl 1.–8.</div><div class="nm">${s[0]?.name?.split(' ')[1]||'–'} vs ${s[s.length-1]?.name?.split(' ')[1]||'–'}</div></div>
    </div>`;
}

// ── 2. FORM TABLE ─────────────────────────────────────────────────────────
function renderForm(n){
  n=n||5;
  const s=D.standings||[];
  const formData=s.map(p=>{
    const res=lastN(p.results,n);
    return {...p,formRes:res,formPts:formPts(res),formAvg:avgFpl(res)};
  }).sort((a,b)=>b.formPts-a.formPts||b.formAvg-a.formAvg);

  const rows=formData.map((p,i)=>{
    const form=p.formRes.map(r=>`<div class="fd ${r.result}"></div>`).join('');
    const lc=i<2?'t':i<4?'m':'b';
    return `<tr>
      <td style="font-family:var(--fm);color:var(--mu)">${i+1}</td>
      <td><div style="font-weight:500">${p.name}</div><div style="font-size:11px;color:var(--mu)">${p.team}</div></td>
      <td><span class="lp ${lc}">${p.formPts}</span></td>
      <td style="font-family:var(--fm);color:var(--g)">${p.formRes.filter(r=>r.result==='W').length}</td>
      <td style="font-family:var(--fm);color:var(--sh)">${p.formRes.filter(r=>r.result==='L').length}</td>
      <td style="font-family:var(--fm);color:var(--mu)">${p.formAvg}</td>
      <td><div class="frow">${form}</div></td>
    </tr>`;
  }).join('');

  $('s-form').innerHTML=`
    <div class="st"><span class="a">Forma</span> – aktuální výkonnost</div>
    <div class="form-tabs">
      ${[5,10,20,36].map(x=>`<div class="form-tab ${x===n?'active':''}" onclick="renderForm(${x});rendered.form=true">${x===36?'Celá sezóna':'Posl. '+x+' GW'}</div>`).join('')}
    </div>
    <div class="tw"><table><thead><tr><th>#</th><th>Hráč</th><th>Body</th><th>V</th><th>P</th><th>Avg FPL</th><th>Forma</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="div"></div>
    <div class="sub">Kdo je aktuálně "in form"?</div>
    <div style="background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:16px">
      ${formData.slice(0,3).map((p,i)=>{
        const medals=['🔥 Nejžhavější','⚡ Druhý','💪 Třetí'];
        return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bo)">
          <span style="font-size:20px">${['🔥','⚡','💪'][i]}</span>
          <div style="flex:1"><div style="font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--mu)">${medals[i]} · ${p.formPts} bodů za posledních ${n} GW</div></div>
          <div class="frow">${p.formRes.map(r=>`<div class="fd ${r.result}"></div>`).join('')}</div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── 3. PLAYOFF ────────────────────────────────────────────────────────────
function renderPlayoff(){
  const po=D.playoff||{};
  const sf=po.shiva_sf||[], fin=po.shiva_final||[], playout=po.playout_sf||[];
  const gw=D.meta.current_gw;

  function sfM(m,label){
    if(!m)return'';
    const we=m.winner,h=m.home,a=m.away,done=!!we;
    const badge=done?'<span class="tbadge done">✅ odehráno</span>':gw>=37?'<span class="tbadge lv">LIVE</span>':'<span class="tbadge tbd">čeká</span>';
    const hW=we&&we==h.entry,aW=we&&we==a.entry;
    return `<div class="bm shiva"><div class="bh sh">${label} ${badge}</div>
      <div class="be ${hW?'w':aW?'l':''}"><div><div class="bn">${h.name}</div><div class="bt">${h.team}</div></div>
        <div style="text-align:right"><div style="font-family:var(--fm);font-size:15px;${hW?'color:var(--g);font-weight:600':'color:var(--mu)'}">${h.gw37_fpl??'—'} pts</div>${hW?'<div style="font-size:11px;color:var(--g)">→ FINÁLE</div>':aW?'<div style="font-size:11px;color:var(--sh)">vypadl</div>':''}</div></div>
      <div class="be ${aW?'w':hW?'l':''}"><div><div class="bn">${a.name}</div><div class="bt">${a.team}</div></div>
        <div style="text-align:right"><div style="font-family:var(--fm);font-size:15px;${aW?'color:var(--g);font-weight:600':'color:var(--mu)'}">${a.gw37_fpl??'—'} pts</div>${aW?'<div style="font-size:11px;color:var(--g)">→ FINÁLE</div>':hW?'<div style="font-size:11px;color:var(--sh)">vypadl</div>':''}</div></div>
    </div>`;
  }

  function finM(){
    const m=fin[0];
    const badge=m?.winner?'<span class="tbadge done">✅ vítěz znám</span>':gw>=38?'<span class="tbadge lv">LIVE</span>':'<span class="tbadge tbd">čeká</span>';
    const hW=m?.winner&&m.winner==m?.home?.entry,aW=m?.winner&&m.winner==m?.away?.entry;
    return `<div class="bm fin" style="border-color:rgba(212,168,0,.5)"><div class="bh fsh">🏆 Shiva finále GW38 ${badge}</div>
      <div class="be ${hW?'w':aW?'l':''}"><div><div class="bn">${m?.home?.name||'?'}</div><div class="bt">vítěz SF-A</div></div>
        <div style="text-align:right"><div style="font-family:var(--fm);font-size:14px;${hW?'color:var(--g);font-weight:600':''}">${m?.home?.gw38_fpl??'—'} pts</div>${hW?'<div style="color:var(--go);font-weight:700;font-size:13px">🏆 SHIVA!</div>':''}</div></div>
      <div class="be ${aW?'w':hW?'l':''}"><div><div class="bn">${m?.away?.name||'?'}</div><div class="bt">vítěz SF-B</div></div>
        <div style="text-align:right"><div style="font-family:var(--fm);font-size:14px;${aW?'color:var(--g);font-weight:600':''}">${m?.away?.gw38_fpl??'—'} pts</div>${aW?'<div style="color:var(--go);font-weight:700;font-size:13px">🏆 SHIVA!</div>':''}</div></div>
      <div class="bnote">Čistá čára – žádný náskok. Více FPL bodů v GW38 = Shiva.</div>
    </div>`;
  }

  function plSF(m,label){
    if(!m)return'';
    const h=m.higher,a=m.lower,hW=m.winner==h.entry;
    const badge=m.winner?'<span class="tbadge done">✅ odehráno</span>':gw>=37?'<span class="tbadge lv">LIVE</span>':'<span class="tbadge tbd">čeká</span>';
    return `<div class="bm pl"><div class="bh plo">${label} ${badge}</div>
      <div class="be ${hW?'w':'l'}"><div><div class="bn">${h.name}</div><div class="bt">${h.team} · ${h.league_pts}b</div></div>
        <div style="text-align:right"><div style="font-family:var(--fm);font-size:14px;${hW?'color:var(--g);font-weight:600':'color:var(--mu)'}">${h.gw37_fpl} pts</div>${hW?'<div style="font-size:11px;color:var(--g)">bezpečný ✓</div>':'<div style="font-size:11px;color:var(--sh)">→ Sacko finále</div>'}</div></div>
      <div class="be ${!hW?'w':'l'}"><div><div class="bn">${a.name}</div><div class="bt">${a.team} · ${a.league_pts}b</div></div>
        <div style="text-align:right"><div style="font-family:var(--fm);font-size:14px;${!hW?'color:var(--g);font-weight:600':'color:var(--mu)'}">${a.gw37_fpl} pts</div>${!hW?'<div style="font-size:11px;color:var(--g)">bezpečný ✓</div>':'<div style="font-size:11px;color:var(--sh)">→ Sacko finále</div>'}</div></div>
      <div class="vrow">Náskok ${h.name}: +${h.naskok}b → virtuálně ${h.virtual} vs ${a.virtual}</div>
    </div>`;
  }

  const losers=playout.map(m=>m.loser==m.higher.entry?m.higher:m.lower);
  const sackoFin=`<div class="bm fin" style="border-color:rgba(204,51,51,.5)"><div class="bh fsk">💩 Sacko finále GW38 ${gw>=38?'<span class="tbadge lv">LIVE</span>':'<span class="tbadge tbd">čeká</span>'}</div>
    ${losers.map(l=>`<div class="be"><div><div class="bn">${l?.name||'?'}</div><div class="bt">poražený SF</div></div><div class="bpts lv">${gw>=38?'probíhá...':'GW38 čeká'}</div></div>`).join('')}
    <div class="bnote">Čistá čára. Méně FPL bodů v GW38 = 💩 SACKO.</div>
  </div>`;

  $('s-playoff').innerHTML=`
    <div class="st"><span class="a">Playoff</span> &amp; Playout<span class="d">GW37–38</span></div>
    <div class="ibox"><strong style="color:var(--g)">GW37 SF ✅</strong> · <strong style="color:var(--pk)">GW38 finále ${gw>=38?'🔴 LIVE':'– čeká se'}</strong><br><span style="color:var(--mu)">Playout FPL nezobrazuje – počítáme manuálně s virtuálním náskokem.</span></div>
    <div class="sub" style="color:var(--go)">🏆 Shiva Bracket</div>
    <div class="pg"><div><div class="colt" style="color:var(--go)">SF GW37</div>${sfM(sf[0],'Zápas A')}${sfM(sf[1],'Zápas B')}</div><div class="barr">➜</div><div><div class="colt" style="color:var(--go)">FINÁLE GW38</div>${finM()}</div></div>
    <div class="div"></div>
    <div class="sub" style="color:var(--sv)">🛡️ Playout Bracket</div>
    <div class="pg"><div><div class="colt" style="color:var(--sv)">SF GW37 (virtuální body)</div>${plSF(playout[0],'Zápas C')}${plSF(playout[1],'Zápas D')}</div><div class="barr">➜</div><div><div class="colt" style="color:var(--sh)">💩 SACKO FINÁLE</div>${sackoFin}</div></div>`;
}

// ── 4. LIVE GW ────────────────────────────────────────────────────────────
function renderLive(){
  const gw=D.meta.current_gw;
  const s=D.standings||[];

  // Zkus najít aktuální GW body z picks_stats
  const perM=D.picks_stats?.per_manager||{};
  const liveData=s.map(p=>{
    const m=perM[p.entry]||perM[String(p.entry)]||{};
    const gwPts=m.gw_points||{};
    const latestPts=gwPts[String(gw)]||gwPts[gw]||null;
    return {...p, livePts:latestPts};
  });

  const hasLive=liveData.some(p=>p.livePts!==null);

  if(!hasLive){
    $('s-live').innerHTML=`
      <div class="st"><span class="a">Live</span> GW${gw}</div>
      <div style="background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:32px;text-align:center">
        <div style="font-size:36px;margin-bottom:12px">⏳</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">GW${gw} data nejsou ještě dostupná</div>
        <div style="color:var(--mu);font-size:13px">Live data se zobrazí po zahájení gameweeku a prvním spuštění GitHub Actions.<br>Actions běží každou hodinu automaticky.</div>
      </div>
      <div class="div"></div>
      <div class="sub">Poslední known GW výsledky</div>
      <div class="live-grid">
        ${s.map(p=>{
          const m=perM[p.entry]||perM[String(p.entry)]||{};
          const gwPts=m.gw_points||{};
          const lastGw=Math.max(...Object.keys(gwPts).map(Number).filter(x=>x<=36));
          const lastPts=gwPts[lastGw]||'–';
          const info=MS[p.entry]||{};
          return `<div class="live-card"><div class="live-name">${info.e||'👤'} ${p.name}</div><div class="live-team">${p.team}</div>
            <div style="margin-top:8px"><span style="font-size:11px;color:var(--mu)">GW${lastGw}: </span><span class="live-score">${lastPts}</span><span style="font-size:11px;color:var(--mu)"> pts</span></div></div>`;
        }).join('')}
      </div>`;
    return;
  }

  // Seřaď dle live bodů
  const sorted=[...liveData].sort((a,b)=>(b.livePts||0)-(a.livePts||0));

  $('s-live').innerHTML=`
    <div class="st"><span class="a">Live</span> GW${gw} <span style="background:var(--pk);color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;animation:pd 1.5s infinite">LIVE</span></div>
    <div class="live-grid">
      ${sorted.map((p,i)=>{
        const info=MS[p.entry]||{};
        const cls=i===0?'leading':i>=6?'trailing':'';
        const badge=i===0?'<div class="live-badge lead">🔥 Vedoucí</div>':i>=6?'<div class="live-badge trail">💀 Poslední</div>':'';
        return `<div class="live-card ${cls}">${badge}
          <div class="live-name">${info.e||'👤'} ${p.name}</div>
          <div class="live-team">${p.team}</div>
          <div class="live-score" style="margin-top:8px">${p.livePts}</div>
          <div style="font-size:11px;color:var(--mu)">bodů GW${gw}</div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── 5. AWARDS / TITULY ────────────────────────────────────────────────────
function renderAwards(){
  const s=D.standings||[];
  const perM=D.picks_stats?.per_manager||{};
  const h2h=D.h2h||{};

  // Výpočty
  const capAvgs={}, chipCounts={}, haalandGws={}, bestCapGws={}, worstCapGws={};
  s.forEach(p=>{
    const m=perM[p.entry]||perM[String(p.entry)]||{};
    const capH=m.cap_history||[];
    if(capH.length) capAvgs[p.entry]=+(capH.reduce((s,c)=>s+c.gw_total,0)/capH.length).toFixed(1);
    chipCounts[p.entry]=Object.keys(m.chips||{}).length;
    const haFan=m.top_players?.find(x=>x.name==='Haaland');
    if(haFan) haalandGws[p.entry]=haFan.gws;
    if(capH.length){
      bestCapGws[p.entry]=capH.reduce((b,c)=>c.gw_total>b.gw_total?c:b);
      worstCapGws[p.entry]=capH.reduce((b,c)=>c.gw_total<b.gw_total?c:b);
    }
  });

  function winner(obj,higher=true){
    const e=higher?Object.entries(obj).sort((a,b)=>b[1]-a[1])[0]:Object.entries(obj).sort((a,b)=>a[1]-b[1])[0];
    if(!e)return{name:'?',val:'–'};
    const p=s.find(x=>x.entry==e[0]);
    return{name:p?.name||'?',val:e[1]};
  }

  // H2H dominance
  const h2hScores={};
  s.forEach(p=>{
    const myH2H=h2h[p.entry]||h2h[String(p.entry)]||{};
    h2hScores[p.entry]=Object.values(myH2H).reduce((s,r)=>s+r.w,0);
  });

  // Nejkonzistentnější (nejmenší rozptyl FPL bodů)
  const consistency={};
  s.forEach(p=>{
    const pts=(p.results||[]).filter(r=>r.gw<=36).map(r=>r.fpl);
    if(pts.length){
      const avg=pts.reduce((a,b)=>a+b,0)/pts.length;
      const variance=pts.reduce((s,x)=>s+Math.pow(x-avg,2),0)/pts.length;
      consistency[p.entry]=+Math.sqrt(variance).toFixed(1);
    }
  });

  // Nejlepší záchrana (největší bod comeback - min na max v poslední třetině)
  const comebacks={};
  s.forEach(p=>{
    const res=(p.results||[]).filter(r=>r.gw<=36);
    if(res.length>=12){
      const firstHalf=res.slice(0,18);
      const secondHalf=res.slice(18);
      const f1=formPts(firstHalf),f2=formPts(secondHalf);
      comebacks[p.entry]=f2-f1;
    }
  });

  const awards=[
    {emoji:'🎯',title:'Nejlepší kapitán',cls:'gold',
     winner:winner(capAvgs,true).name,
     detail:`Průměr ${winner(capAvgs,true).val} pts/GW s kapitánem`,desc:'Největší kapitánský mozek ligy'},
    {emoji:'😬',title:'Nejhorší kapitán',cls:'shame',
     winner:winner(capAvgs,false).name,
     detail:`Průměr ${winner(capAvgs,false).val} pts/GW s kapitánem`,desc:'Kapitánská volba jako ruská ruleta'},
    {emoji:'💊',title:'Chip závislák',cls:'purple',
     winner:winner(chipCounts,true).name,
     detail:`${winner(chipCounts,true).val} chipů použito`,desc:'Čip na každou příležitost'},
    {emoji:'🐘',title:'Haaland závislák',cls:'green',
     winner:(()=>{const e=Object.entries(haalandGws).sort((a,b)=>b[1]-a[1])[0];return s.find(x=>x.entry==e?.[0])?.name||'?'})(),
     detail:`${Math.max(...Object.values(haalandGws))} GW s Haalandem v sestavě`,desc:'Erling Haaland je jejich životní partner'},
    {emoji:'🎰',title:'Největší exploze',cls:'pink',
     winner:(()=>{const best=Object.entries(bestCapGws).sort((a,b)=>b[1].gw_total-a[1].gw_total)[0];const p=s.find(x=>x.entry==best?.[0]);return p?.name||'?'})(),
     detail:`${Object.entries(bestCapGws).sort((a,b)=>b[1].gw_total-a[1].gw_total)[0]?.[1]?.gw_total||'–'} pts v nejlepším GW s kapitánem`,desc:'Ten jeden zlatý GW'},
    {emoji:'🤦',title:'Kapitánský blunder',cls:'shame',
     winner:(()=>{const worst=Object.entries(worstCapGws).sort((a,b)=>a[1].gw_total-b[1].gw_total)[0];const p=s.find(x=>x.entry==worst?.[0]);return p?.name||'?'})(),
     detail:`${Object.entries(worstCapGws).sort((a,b)=>a[1].gw_total-b[1].gw_total)[0]?.[1]?.gw_total||'–'} pts v nejhorším GW s kapitánem`,desc:'Kapitán? Spíš závaží na noze'},
    {emoji:'🛡️',title:'H2H dominance',cls:'gold',
     winner:(()=>{const e=Object.entries(h2hScores).sort((a,b)=>b[1]-a[1])[0];return s.find(x=>x.entry==e?.[0])?.name||'?'})(),
     detail:`${Math.max(...Object.values(h2hScores))} výher v H2H celkem`,desc:'Nepřemožitelný soubojník'},
    {emoji:'🎯',title:'Nejkonzistentnější',cls:'green',
     winner:(()=>{const e=Object.entries(consistency).sort((a,b)=>a[1]-b[1])[0];return s.find(x=>x.entry==e?.[0])?.name||'?'})(),
     detail:`Std. odchylka ${Math.min(...Object.values(consistency))} pts`,desc:'Klidná voda, hloubka nepopsatelná'},
    {emoji:'📈',title:'Největší comeback',cls:'blue',
     winner:(()=>{const e=Object.entries(comebacks).sort((a,b)=>b[1]-a[1])[0];return s.find(x=>x.entry==e?.[0])?.name||'?'})(),
     detail:`+${Math.max(...Object.values(comebacks))} bodů (1. vs 2. polovina)`,desc:'Pomalý start, rychlý konec'},
    {emoji:'💀',title:'Rekordní prohrář',cls:'shame',
     winner:s[s.length-1]?.name||'?',
     detail:`${s[s.length-1]?.l||'?'} proher v sezóně`,desc:'Historický rekord – nikdy v lize nebylo hůře'},
    {emoji:'👑',title:'Vítěz základní části',cls:'gold',
     winner:s[0]?.name||'?',
     detail:`${s[0]?.pts||'?'} ligových bodů`,desc:'Král základní části'},
    {emoji:'📊',title:'FPL bodový magnát',cls:'green',
     winner:(()=>{const top=s.reduce((b,p)=>p.fpl_total>b.fpl_total?p:b,s[0]);return top?.name||'?'})(),
     detail:`${fm(s.reduce((b,p)=>p.fpl_total>b.fpl_total?p:b,s[0])?.fpl_total||0)} FPL bodů celkem`,desc:'Nejvíce PL bodů v lize'},
  ];

  $('s-awards').innerHTML=`
    <div class="st"><span class="a">Tituly</span> sezóny 2024/25<span class="d">automaticky vypočítané</span></div>
    <div class="awards-grid">${awards.map(a=>`
      <div class="award-card ${a.cls}">
        <span class="award-emoji">${a.emoji}</span>
        <div class="award-title">${a.title}</div>
        <div class="award-winner">${a.winner}</div>
        <div class="award-detail">${a.detail}</div>
        <div style="font-size:11px;color:var(--mu);margin-top:4px;font-style:italic">${a.desc}</div>
      </div>`).join('')}
    </div>`;
}

// ── 6. DUEL ───────────────────────────────────────────────────────────────
function renderDuel(eA,eB){
  const s=D.standings||[];
  const h2h=D.h2h||{};

  if(!eA) eA=s[0]?.entry;
  if(!eB) eB=s[1]?.entry;

  const opts=s.map(p=>`<option value="${p.entry}" ${p.entry==eA?'selected':''}>${MS[p.entry]?.e||''} ${p.name}</option>`).join('');
  const optsB=s.map(p=>`<option value="${p.entry}" ${p.entry==eB?'selected':''}>${MS[p.entry]?.e||''} ${p.name}</option>`).join('');

  const pA=s.find(p=>p.entry==eA), pB=s.find(p=>p.entry==eB);
  if(!pA||!pB){ $('s-duel').innerHTML=`<div class="st"><span class="a">Duel</span></div>`; return; }

  const infoA=MS[eA]||{}, infoB=MS[eB]||{};
  const h=h2h[String(eA)]?.[String(eB)]||h2h[eA]?.[eB]||{w:0,l:0,d:0};
  const tot=h.w+h.l+(h.d||0);
  const hPct=tot>0?Math.round(h.w/tot*100):50;
  const lPct=100-hPct;

  // GW po GW porovnání
  const gwRes=[];
  const resA=(pA.results||[]).filter(r=>r.gw<=36);
  const resB=(pB.results||[]).filter(r=>r.gw<=36);
  const maxGw=Math.max(...resA.map(r=>r.gw));
  for(let g=1;g<=maxGw;g++){
    const rA=resA.find(r=>r.gw===g), rB=resB.find(r=>r.gw===g);
    if(rA&&rB) gwRes.push({gw:g,ptsA:rA.fpl,ptsB:rB.fpl,winner:rA.fpl>rB.fpl?'A':rA.fpl<rB.fpl?'B':'D'});
  }
  const gwA=gwRes.filter(g=>g.winner==='A').length;
  const gwB=gwRes.filter(g=>g.winner==='B').length;
  const gwD=gwRes.filter(g=>g.winner==='D').length;
  const maxPts=Math.max(...gwRes.map(g=>Math.max(g.ptsA,g.ptsB)));

  const gwBars=gwRes.map(g=>{
    const h=Math.max(4,Math.round((Math.max(g.ptsA,g.ptsB)/maxPts)*55));
    const cls=g.winner==='A'?'win':g.winner==='B'?'loss':'draw';
    return `<div class="gw-duel-bar ${cls}" style="height:${h}px" title="GW${g.gw}: ${pA.name.split(' ')[1]} ${g.ptsA} vs ${pB.name.split(' ')[1]} ${g.ptsB}"></div>`;
  }).join('');

  function statRow(label,valA,valB,higher=true){
    const aWin=higher?valA>valB:valA<valB;
    const bWin=higher?valB>valA:valB<valA;
    return `<div class="duel-stat-row">
      <div style="text-align:right"><span class="duel-val ${aWin?'win':bWin?'loss':'tie'}">${valA}</span></div>
      <div class="duel-label">${label}</div>
      <div><span class="duel-val ${bWin?'win':aWin?'loss':'tie'}">${valB}</span></div>
    </div>`;
  }

  const pmA=D.picks_stats?.per_manager?.[String(eA)]||{};
  const pmB=D.picks_stats?.per_manager?.[String(eB)]||{};
  const capAvgA=pmA.cap_history?.length?(pmA.cap_history.reduce((s,c)=>s+c.gw_total,0)/pmA.cap_history.length).toFixed(1):'–';
  const capAvgB=pmB.cap_history?.length?(pmB.cap_history.reduce((s,c)=>s+c.gw_total,0)/pmB.cap_history.length).toFixed(1):'–';

  $('s-duel').innerHTML=`
    <div class="st"><span class="a">Přímý</span> duel</div>
    <div class="duel-select">
      <select class="duel-sel" onchange="renderDuel(this.value,${eB});rendered.duel=true">${opts}</select>
      <div style="font-family:var(--fh);font-size:22px;color:var(--mu);padding:8px;align-self:center">VS</div>
      <select class="duel-sel" onchange="renderDuel(${eA},this.value);rendered.duel=true">${optsB}</select>
    </div>
    <div class="duel-vs">
      <div class="duel-header">
        <div><div style="font-size:44px">${infoA.e||'👤'}</div><div class="duel-name">${pA.name.split(' ')[1]||pA.name}</div><div style="font-size:11px;color:var(--mu)">${pA.team}</div></div>
        <div class="duel-vs-badge">VS</div>
        <div><div style="font-size:44px">${infoB.e||'👤'}</div><div class="duel-name">${pB.name.split(' ')[1]||pB.name}</div><div style="font-size:11px;color:var(--mu)">${pB.team}</div></div>
      </div>
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span style="color:var(--g);font-weight:600">${h.w}× výher</span>
          <span style="color:var(--mu)">${h.d||0}× remíza</span>
          <span style="color:var(--sh);font-weight:600">${h.l}× proher</span>
        </div>
        <div class="duel-bar-wrap"><div class="duel-bar-a" style="width:${hPct}%"></div><div class="duel-bar-b"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mu)"><span>${hPct}%</span><span>${lPct}%</span></div>
      </div>
      ${statRow('Ligové body',pA.pts,pB.pts)}
      ${statRow('FPL celkem',fm(pA.fpl_total),fm(pB.fpl_total))}
      ${statRow('Výher H2H',h.w,h.l)}
      ${statRow('Průměr FPL/GW',avgFpl((pA.results||[]).filter(r=>r.gw<=36)),avgFpl((pB.results||[]).filter(r=>r.gw<=36)))}
      ${statRow('Avg s kapitánem',capAvgA,capAvgB)}
      ${statRow('Shivy',infoA.shiva||0,infoB.shiva||0)}
      ${statRow('Sacka',infoA.sacko||0,infoB.sacko||0,false)}
      ${statRow('FPL GW duely (bodů)',gwA,gwB)}
    </div>
    <div class="sub">GW po GW – kdo měl více FPL bodů</div>
    <div style="background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:12px">
      <div style="display:flex;gap:12px;font-size:11px;color:var(--mu);margin-bottom:8px">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:rgba(0,255,133,.6);display:inline-block"></span>${pA.name.split(' ')[1]} vyhrál (${gwA}×)</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:rgba(255,68,68,.5);display:inline-block"></span>${pB.name.split(' ')[1]} vyhrál (${gwB}×)</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:rgba(245,200,66,.5);display:inline-block"></span>Remíza (${gwD}×)</span>
      </div>
      <div class="gw-duel">${gwBars}</div>

// ── 10. PREDIKCE ──────────────────────────────────────────────────────────
function renderPredict(){
  const s=D.standings||[];
  const po=D.playoff||{};
  const h2h=D.h2h||{};

  function calcProb(pA,pB){
    const resA=(pA.results||[]).filter(r=>r.gw<=36);
    const resB=(pB.results||[]).filter(r=>r.gw<=36);
    // Faktory: avg posledních 5, avg celé sezóny, H2H
    const avg5A=avgFpl(resA.slice(-5)), avg5B=avgFpl(resB.slice(-5));
    const avgAllA=avgFpl(resA), avgAllB=avgFpl(resB);
    const myH2H=(h2h[String(pA.entry)]||{})[String(pB.entry)]||{w:0,l:0};
    const h2hAdv=myH2H.w-myH2H.l;
    // Váhovaný score
    const scoreA=avg5A*0.5+avgAllA*0.3+h2hAdv*2;
    const scoreB=avg5B*0.5+avgAllB*0.3;
    const total=scoreA+scoreB;
    const prob=total>0?Math.round(scoreA/total*100):50;
    return{prob:Math.max(20,Math.min(80,prob)),avg5A,avg5B,avgAllA,avgAllB,h2hAdv};
  }

  function predCard(matchup,type){
    const {home,away,label}=matchup;
    const pA=s.find(p=>p.entry==home?.entry||p.name===home?.name);
    const pB=s.find(p=>p.entry==away?.entry||p.name===away?.name);
    if(!pA||!pB) return '';
    const {prob,avg5A,avg5B,avgAllA,avgAllB,h2hAdv}=calcProb(pA,pB);
    const infoA=MS[pA.entry]||{}, infoB=MS[pB.entry]||{};
    const favA=prob>=50, col=type==='shiva'?'var(--go)':'var(--sh)';
    return `<div class="pred-card" style="border-color:${type==='shiva'?'rgba(212,168,0,.3)':'rgba(204,51,51,.3)'}">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${col};margin-bottom:12px">${label}</div>
      <div class="pred-vs">
        <div style="text-align:${favA?'left':'right'}">
          <div style="font-size:28px">${infoA.e||'👤'}</div>
          <div class="pred-name">${pA.name.split(' ')[1]||pA.name}</div>
          <div class="pred-avg">Avg L5: ${avg5A} | Celk: ${avgAllA}</div>
          <div class="pred-prob ${favA?'fav':'dog'}">${prob}%</div>
        </div>
        <div class="duel-vs-badge">VS</div>
        <div style="text-align:${!favA?'left':'right'}">
          <div style="font-size:28px">${infoB.e||'👤'}</div>
          <div class="pred-name">${pB.name.split(' ')[1]||pB.name}</div>
          <div class="pred-avg">Avg L5: ${avg5B} | Celk: ${avgAllB}</div>
          <div class="pred-prob ${!favA?'fav':'dog'}">${100-prob}%</div>
        </div>
      </div>
      <div class="pred-bar"><div class="pred-bar-a" style="width:${prob}%"></div><div class="pred-bar-b"></div></div>
      <div class="pred-factors">
        <span class="pred-factor">Forma L5: ${avg5A} vs ${avg5B}</span>
        <span class="pred-factor">Sezóna avg: ${avgAllA} vs ${avgAllB}</span>
        <span class="pred-factor">H2H výhody: ${h2hAdv>0?'+':''} ${h2hAdv} pro ${pA.name.split(' ')[1]}</span>
      </div>
    </div>`;
  }

  // Vytvoř matchupy z playoff dat
  const sf=po.shiva_sf||[], playout=po.playout_sf||[], fin=po.shiva_final||[];
  const matchups=[];

  // Shiva finále (GW38)
  if(fin[0]){
    matchups.push({home:fin[0].home,away:fin[0].away,label:'🏆 Shiva finále – GW38',type:'shiva'});
  } else if(sf.length>=2){
    // Pokud finále ještě není definované, ukáž predikce ze SF výsledků
    const w1=sf[0]?.winner?s.find(p=>p.entry==sf[0].winner):null;
    const w2=sf[1]?.winner?s.find(p=>p.entry==sf[1].winner):null;
    if(w1&&w2) matchups.push({home:{entry:w1.entry,name:w1.name},away:{entry:w2.entry,name:w2.name},label:'🏆 Shiva finále – GW38 (predikce)',type:'shiva'});
  }

  // Sacko finále
  const losers=playout.map(m=>m.loser);
  if(losers.length>=2){
    const lA=s.find(p=>p.entry==losers[0]), lB=s.find(p=>p.entry==losers[1]);
    if(lA&&lB) matchups.push({home:{entry:lA.entry,name:lA.name},away:{entry:lB.entry,name:lB.name},label:'💩 Sacko finále – GW38',type:'sacko'});
  }

  // SF zápasy (pokud ještě neproběhly)
  sf.forEach((m,i)=>{
    if(!m.winner){
      matchups.push({home:m.home,away:m.away,label:`🏆 Shiva SF – Zápas ${String.fromCharCode(65+i)}`,type:'shiva'});
    }
  });
  playout.forEach((m,i)=>{
    if(!m.winner){
      const higher=s.find(p=>p.entry==m.higher?.entry);
      const lower=s.find(p=>p.entry==m.lower?.entry);
      if(higher&&lower) matchups.push({home:{entry:higher.entry,name:higher.name},away:{entry:lower.entry,name:lower.name},label:`🛡️ Playout SF – Zápas ${String.fromCharCode(67+i)}`,type:'sacko'});
    }
  });

  $('s-predict').innerHTML=`
    <div class="st"><span class="a">Predikce</span><span class="d">na základě formy, průměru a H2H</span></div>
    <div class="ibox">Predikce jsou vypočítané algoritmem: <strong>50% váha formy posledních 5 GW</strong> + <strong>30% váha průměru celé sezóny</strong> + <strong>H2H historická výhoda</strong>. Nejde o záruku výsledku.</div>
    ${matchups.map(m=>predCard(m,m.type)).join('')}
    <div class="div"></div>
    <div class="sub">Predikce pro hypotetické zápasy</div>
    <div style="background:var(--b2);border:1px solid var(--bo);border-radius:var(--r);padding:14px">
      <div style="font-size:13px;color:var(--mu);margin-bottom:10px">Vyber si jakýkoliv duel a viz predikci:</div>
      <div class="duel-select">
        <select class="duel-sel" id="pred-a" onchange="updatePredHypo()">${s.map(p=>`<option value="${p.entry}">${MS[p.entry]?.e||''} ${p.name}</option>`).join('')}</select>
        <div style="font-family:var(--fh);font-size:18px;color:var(--mu);padding:8px;align-self:center">VS</div>
        <select class="duel-sel" id="pred-b" onchange="updatePredHypo()">${s.map((p,i)=>`<option value="${p.entry}" ${i===1?'selected':''}>${MS[p.entry]?.e||''} ${p.name}</option>`).join('')}</select>
      </div>
      <div id="pred-hypo"></div>
    </div>`;

  updatePredHypo();
}

function updatePredHypo(){
  const eA=parseInt($('pred-a')?.value)||0;
  const eB=parseInt($('pred-b')?.value)||0;
  if(!eA||!eB||eA===eB){$('pred-hypo').innerHTML='<div style="color:var(--mu);font-size:13px;padding:8px">Vyber dva různé hráče.</div>';return;}
  const s=D.standings||[];
  const h2h=D.h2h||{};
  const pA=s.find(p=>p.entry==eA), pB=s.find(p=>p.entry==eB);
  if(!pA||!pB)return;
  const resA=(pA.results||[]).filter(r=>r.gw<=36);
  const resB=(pB.results||[]).filter(r=>r.gw<=36);
  const avg5A=avgFpl(resA.slice(-5)), avg5B=avgFpl(resB.slice(-5));
  const avgAllA=avgFpl(resA), avgAllB=avgFpl(resB);
  const myH2H=(h2h[String(eA)]||{})[String(eB)]||{w:0,l:0};
  const h2hAdv=myH2H.w-myH2H.l;
  const scoreA=avg5A*0.5+avgAllA*0.3+h2hAdv*2;
  const scoreB=avg5B*0.5+avgAllB*0.3;
  const total=scoreA+scoreB;
  const prob=total>0?Math.max(20,Math.min(80,Math.round(scoreA/total*100))):50;
  const infoA=MS[eA]||{}, infoB=MS[eB]||{};
  const favA=prob>=50;
  $('pred-hypo').innerHTML=`
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bo)">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;text-align:center;margin-bottom:10px">
        <div><div style="font-size:24px">${infoA.e||'👤'}</div><div style="font-weight:600">${pA.name.split(' ')[1]}</div><div class="pred-prob ${favA?'fav':'dog'}" style="font-size:22px">${prob}%</div></div>
        <div style="font-family:var(--fh);font-size:18px;color:var(--mu);align-self:center">VS</div>
        <div><div style="font-size:24px">${infoB.e||'👤'}</div><div style="font-weight:600">${pB.name.split(' ')[1]}</div><div class="pred-prob ${!favA?'fav':'dog'}" style="font-size:22px">${100-prob}%</div></div>
      </div>
      <div class="pred-bar" style="height:8px;border-radius:4px"><div class="pred-bar-a" style="width:${prob}%"></div><div class="pred-bar-b"></div></div>
      <div class="pred-factors" style="margin-top:8px">
        <span class="pred-factor">Forma L5: ${avg5A} vs ${avg5B}</span>
        <span class="pred-factor">Avg: ${avgAllA} vs ${avgAllB}</span>
        <span class="pred-factor">H2H: ${myH2H.w}:${myH2H.l}</span>
      </div>
    </div>`;
}
